<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" role="img" aria-label="BusinessLink">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0d98a"/>
      <stop offset="45%"  stop-color="#d8b25a"/>
      <stop offset="100%" stop-color="#b8923f"/>
    </linearGradient>
    <linearGradient id="gold-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff8e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e7c87c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Symbole infini -->
  <path d="M50,44 C52,29 88,29 88,44 C88,59 52,59 50,44 C48,29 12,29 12,44 C12,59 48,59 50,44"
        fill="none"
        stroke="url(#gold-grad)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Reflet métallique haut des boucles -->
  <path d="M50,44 C52,29 88,29 88,44"
        fill="none"
        stroke="url(#gold-highlight)"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.8"/>
  <path d="M50,44 C48,29 12,29 12,44"
        fill="none"
        stroke="url(#gold-highlight)"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.8"/>

  <!-- Filet séparateur -->
  <line x1="22" y1="67" x2="78" y2="67" stroke="#d8b25a" stroke-width="0.5" opacity="0.35"/>

  <!-- Texte BUSINESSLINK -->
  <text x="50" y="80"
        text-anchor="middle"
        font-family="Jost, system-ui, sans-serif"
        font-size="8.5"
        font-weight="500"
        letter-spacing="2.8"
        fill="#e7c87c">BUSINESSLINK</text>
</svg>
